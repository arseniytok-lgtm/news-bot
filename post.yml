name: Новини

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: news
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - run: pip install requests

      - name: Публікація
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHANNEL_ID: ${{ secrets.TG_CHANNEL_ID }}
        run: python news.py

      - name: Збереження памʼяті
        run: |
          git config user.name "news-bot"
          git config user.email "bot@users.noreply.github.com"
          git pull --rebase --autostash || true
          git add memory.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "published [skip ci]"
          git push || true
